# ── terminal / basics ───────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-ghostty:RGB"     # true color under Ghostty
set -sa terminal-features ",xterm-256color:RGB"    # fallback (SSH / other terms)
set -g escape-time 10                              # snappier; helps nvim
set -g focus-events on                             # nvim FocusGained/autoread works
set -g history-limit 50000
set -g mouse on                                    # drag-select to copy
set -g set-clipboard on                            # OSC52 pass-through (Ghostty → pasteboard)
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# ── reload ──────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux reloaded"

# ── splits & windows open in current dir ────────────────────────
# Both horizontal-split keys (| and the default %) behave identically so a
# split always opens in the current dir, regardless of which key is pressed.
bind '"' split-window -v -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind c   new-window   -c "#{pane_current_path}"

# ── pane resize: prefix + H/J/K/L (repeatable) ──────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── quick app windows ───────────────────────────────────────────
bind g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# ── copy mode: vi select + yank via OSC52 ────────────────────────
# Yank copies to the tmux buffer; `set-clipboard on` (above) forwards it to the
# terminal via OSC52. Works on macOS and Linux (Ghostty supports it, incl. over
# SSH) without any OS-specific clipboard tool like pbcopy/xclip.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# ── plugins (TPM) ───────────────────────────────────────────────
# keep all plugins under the symlinked, gitignored config dir
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'egel/tmux-gruvbox'                  # matches nvim + Ghostty gruvbox dark
set -g @tmux-gruvbox 'dark'                          # dark | medium | light
# status-right widgets x / y / z. Defaults are date / time / hostname(#h) — the
# machine name is often wrong or noisy, so show the current dir there instead.
set -g @tmux-gruvbox-right-status-x '%Y-%m-%d'
set -g @tmux-gruvbox-right-status-y '%H:%M'
set -g @tmux-gruvbox-right-status-z '#{pane_current_path}'
set -g @plugin 'christoomey/vim-tmux-navigator'    # C-h/j/k/l across nvim↔tmux

# only load TPM if it's present — on a fresh clone (before install.sh fetches
# plugins) this avoids a noisy "can't read" message at startup.
if '[ -f ~/.config/tmux/plugins/tpm/tpm ]' \
   'run ~/.config/tmux/plugins/tpm/tpm'
